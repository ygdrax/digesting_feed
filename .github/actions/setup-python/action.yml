name: Setup Python
description: Set up Python 3.13 environment with uv and dependencies

inputs:
  with-dev:
    description: "Whether to install dev dependencies (true/false)"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Upgrade pip and install uv
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install uv

    - name: Install project dependencies with uv
      shell: bash
      run: |
        uv pip install --system -e .
        if [[ "${{ inputs.with-dev }}" == "true" ]]; then
          uv pip install --system -e ".[dev]"
        fi
