<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <title>🔧 Daily DevOps Digest</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        a {
            color: #58a6ff;
        }

        a:hover {
            color: #1f6feb;
        }

        .list-group-item {
            background-color: #1e1e1e;
            border-color: #2a2a2a;
        }

        .form-select {
            background-color: #1e1e1e;
            color: #e0e0e0;
            border-color: #444;
        }

        .form-select option {
            background-color: #1e1e1e;
        }

        .title {
            color: #58a6ff;
        }
    </style>
</head>

<body>
    <div class="container py-5">
        <h1 class="mb-4 text-center title">🔧 Daily DevOps Digest</h1>
        <p class="text-center text-muted">Curated from Hacker News, Reddit, and top tech blogs.</p>

        <!-- Date Filter -->
        <div class="mb-3 text-center">
            <label for="dateFilter" class="form-label me-2">Filter by date:</label>
            <select id="dateFilter" class="form-select w-auto d-inline-block">
                <option value="all">All Dates</option>
                {% for date in articles | map(attribute='date') | unique | sort %}
                <option value="{{ date }}">{{ date }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Source Filter -->
        <div class="mb-4 text-center">
            <label for="sourceFilter" class="form-label me-2">Filter by source:</label>
            <select id="sourceFilter" class="form-select w-auto d-inline-block">
                <option value="all">All Sources</option>
                {% for source in articles | map(attribute='source') | unique | sort %}
                <option value="{{ source }}">{{ source }}</option>
                {% endfor %}
            </select>
        </div>

        <ul class="list-group" id="articleList">
            {% for article in articles %}
            <li class="list-group-item mb-2" data-source="{{ article.source }}" data-date="{{ article.date }}">
                <a href="{{ article.link }}" target="_blank" class="fw-bold text-decoration-none">
                    {{ article.title }}
                </a>
                <p class="mb-1 small text-light">{{ article.summary }}</p>
                <small class="text-secondary">{{ article.source }} | {{ article.date }}</small>
            </li>
            {% else %}
            <li class="list-group-item mb-2 text-center text-muted">
                No articles found.
            </li>
            {% endfor %}
        </ul>

        <footer class="mt-5 text-center text-muted">
            <small>Generated by <strong>digesting_feed</strong>.</small>
        </footer>
    </div>

    <script>
        const sourceFilter = document.getElementById('sourceFilter');
        const dateFilter = document.getElementById('dateFilter');
        const articleListItems = document.querySelectorAll('#articleList li');

        function filterArticles() {
            const sourceValue = sourceFilter.value.toLowerCase();
            const dateValue = dateFilter.value;

            articleListItems.forEach(li => {
                const matchesSource = sourceValue === 'all' || li.dataset.source.toLowerCase() === sourceValue;
                const matchesDate = dateValue === 'all' || li.dataset.date === dateValue;

                if (matchesSource && matchesDate) {
                    li.style.display = '';
                } else {
                    li.style.display = 'none';
                }
            });
        }

        sourceFilter.addEventListener('change', filterArticles);
        dateFilter.addEventListener('change', filterArticles);
    </script>
</body>

</html>
