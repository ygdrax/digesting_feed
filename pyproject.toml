[project]
name = "digesting_feed"
version = "0.1.0"
dependencies = [
    "requests",
    "feedparser",
    "jinja2",
    "beautifulsoup4",
    "sumy",
    "numpy",
    "nltk",
]

[project.optional-dependencies]
dev = [
  "ruff",
  "pylint",
  "pre-commit",
  "black",
  "mypy",
  "pytest",
  "coverage",
]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I"]  # errors, flakes, isort
ignore = ["E501"]  # ignore line-too-long

[tool.pylint]
disable = ["missing-docstring"]

